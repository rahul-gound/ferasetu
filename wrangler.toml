# Cloudflare Worker config for the FeraSetu Worker API.
#
# This is a NEW, self-contained Worker (see worker/index.js). It does NOT run
# the Express backend in backend/ — that one is Node-only and cannot run on
# Workers (sync MySQL/SQLite, nodemailer SMTP, multer file uploads, node-cron).
# This Worker implements the core shopkeeper routes backed by Cloudflare D1.
#
# Deploys from the repo root with:  npx wrangler deploy

name = "ferasetu"
main = "worker/index.js"
compatibility_date = "2025-06-01"

# D1 database binding. The Worker creates its tables automatically on first
# request (CREATE TABLE IF NOT EXISTS), so no manual migration is needed.
# `database_id` is an account-scoped resource id, not a secret — safe to commit.
[[d1_databases]]
binding = "DB"
database_name = "fera-shopkeeper"
database_id = "ac0e07fa-8183-4a99-b744-c095027f61d6"
